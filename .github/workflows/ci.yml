name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & Static Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund --no-package-lock

      - name: Syntax check tracked JS files
        run: |
          set -e
          while IFS= read -r file; do
            node --check "$file"
          done < <(git ls-files '*.js')

      - name: Verify admin dashboard UI
        run: npm run check:admin-ui
